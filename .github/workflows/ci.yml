name: Python Checks

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: ✨ Checkout Repo
        uses: actions/checkout@v4

      - name: 🐳 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: ⭐ Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      - name: ✅ Verify pipeline module imports
        run: |
          python -c "from employee_retention.retention_pipeline import engineer_features, load_data; print('import OK')"
